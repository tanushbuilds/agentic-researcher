{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zyven{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'Logo.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #1a1a18;
            --sidebar-bg: #131311;
            --surface: #222220;
            --surface-hover: #2a2a28;
            --border: #2e2e2c;
            --border-subtle: #252523;
            --text-primary: #e8e5e0;
            --text-secondary: #96948f;
            --text-muted: #5a5856;
            --accent: #c8715a;
            --accent-hover: #d4806a;
            --accent-dim: rgba(200, 113, 90, 0.12);
            --success: #5fa870;
            --error: #b86b65;
            --warning: #c09035;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 248px;
            min-width: 248px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Sidebar top glow */
        .sidebar::before {
            content: '';
            position: absolute;
            top: -40px;
            left: -40px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(200, 113, 90, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Logo area ── */
        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-dim);
            border: 1px solid rgba(200, 113, 90, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .logo-letter {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--accent);
            font-style: italic;
        }

        .logo-badge {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 2px;
        }

        /* ── New Research Button ── */
        .new-research-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 12px 4px;
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-decoration: none;
            letter-spacing: -0.1px;
            position: relative;
            overflow: hidden;
        }

        .new-research-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(200,113,90,0.04) 100%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .new-research-btn:hover {
            border-color: rgba(200, 113, 90, 0.25);
            color: var(--text-primary);
            background: var(--surface);
        }

        .new-research-btn:hover::before {
            opacity: 1;
        }

        .new-research-btn svg {
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .new-research-btn:hover svg {
            opacity: 1;
            color: var(--accent);
        }

        /* ── Sidebar Middle ── */
        .sidebar-middle {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .sidebar-section {
            padding: 4px 12px;
            margin-top: 8px;
        }

        .sidebar-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 0 6px;
            margin-bottom: 6px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            color: var(--text-secondary);
            font-size: 12.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.1px;
        }

        .history-item:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .history-item svg {
            min-width: 13px;
            opacity: 0.35;
            flex-shrink: 0;
        }

        /* ── Sidebar Footer ── */
        .sidebar-footer {
            padding: 10px 12px 14px;
            border-top: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            transition: all 0.15s;
            text-decoration: none;
            letter-spacing: -0.1px;
        }

        .nav-btn:hover {
            background: var(--surface-hover);
            color: var(--text-secondary);
        }

        .nav-btn.active {
            color: var(--text-primary);
            background: var(--surface);
        }

        .nav-btn svg {
            opacity: 0.5;
            transition: opacity 0.15s;
        }

        .nav-btn:hover svg,
        .nav-btn.active svg {
            opacity: 0.8;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #444442; }

        {% block extra_styles %}{% endblock %}
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <a class="logo" href="/">
                <div class="logo-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
                <span class="logo-text"><span class="logo-letter">Z</span>yven</span>
            </a>
        </div>

        {% block sidebar_top %}
        <a class="new-research-btn" href="/">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            New Research
        </a>
        {% endblock %}

        <div class="sidebar-middle">
            {% block sidebar_middle %}{% endblock %}
        </div>

        <div class="sidebar-footer">
            <a class="nav-btn {% block memory_nav_active %}{% endblock %}" href="/memory/">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z" />
                    <path d="M12 8v4l3 3" />
                </svg>
                Memory Viewer
            </a>
        </div>
    </aside>

    <main class="main">
        {% block main_content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

</body>

</html>
